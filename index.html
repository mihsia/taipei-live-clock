<!doctype html>
<html lang="zh-Hant-TW">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#1a2332">
    <title>臺灣標準時間即時鐘</title>
    <link rel="stylesheet" href="styles.css?v=20260603-8">
  </head>
  <body>
    <main class="clock-shell" aria-label="臺灣標準時間即時鐘">
      <section class="clock-panel">
        <div class="location-row" aria-label="時區與所在地">
          <span class="signal-dot" aria-hidden="true"></span>
          <span>宜蘭．臺灣 · Taiwan Standard Time · UTC+8</span>
        </div>

        <div class="date-stack" aria-live="polite">
          <p id="roc-date" class="date-line">中華民國 -- 年 -- 月 -- 日</p>
          <p id="western-date" class="date-line muted">西元 ---- 年 -- 月 -- 日 星期-</p>
        </div>

        <time id="clock-time" class="flip-clock" datetime="00:00:00" aria-label="目前台北時間">
          <span class="time-group">
            <span class="digits-pair">
              <span class="digit-card" data-unit="hour-tens">0</span>
              <span class="digit-card" data-unit="hour-ones">0</span>
            </span>
            <span class="unit-label">HOUR</span>
          </span>

          <span class="time-separator" aria-hidden="true">:</span>

          <span class="time-group">
            <span class="digits-pair">
              <span class="digit-card" data-unit="minute-tens">0</span>
              <span class="digit-card" data-unit="minute-ones">0</span>
            </span>
            <span class="unit-label">MIN</span>
          </span>

          <span class="time-group seconds-group">
            <span class="seconds-pair">
              <span class="second-digit" data-unit="second-tens">0</span>
              <span class="second-digit" data-unit="second-ones">0</span>
            </span>
            <span class="unit-label">SEC</span>
          </span>
        </time>

        <div class="support-row">
          <p id="precision-note" class="precision-note">臺北標準時間 TST · 24 小時制</p>
        </div>
      </section>
    </main>

    <script src="script.js?v=20260603-8"></script>
  </body>
</html>
